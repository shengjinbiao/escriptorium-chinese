#version: "3.9"

x-app:
  &app
  image: registry.gitlab.com/scripta/escriptorium:latest
  build:
    context: .
  env_file: variables.env
  volumes:
    - ./app/:/usr/src/app/ # # 需要实时开发后端时保留，否则注释掉
    - ./front/dist:/usr/src/app/front/dist # 统一到 /usr/src/app/front/dist
  command: /bin/true

services:

  web:
    <<: *app
    command: uwsgi --ini /usr/src/app/uwsgi.ini
    expose:
      - 8000
    volumes:
      - ./app/:/usr/src/app/
      - ./front/dist:/usr/src/app/front/dis
      - static:/usr/src/app/static # 生产环境需要挂载静态文件卷
      - media:/usr/src/app/media # 生产环境需要挂载静态和媒体文件卷
   
  # daphne 命令的目录路径，官方的目录路径是escriptorium, 新版改成了escriptorium_chinese, 
  # 跟代码仓库的路径要一致，要不然daphne找不到模块。daphne用于WebSocket的通道服务器。
  # dappne保证通道服务器channelserver运行， 用于非同步（asynchronous）的编辑和更新。
  channelserver:
    <<: *app
    command: daphne --bind 0.0.0.0 --port 5000 -v 1 escriptorium_chinese.asgi:application 
    expose:
      - 5000

  db:
    image: docker.io/library/postgres:15
    volumes:
      - postgres:/var/lib/postgresql/data/
    env_file: variables.env

  redis:
    image: "docker.io/redis:alpine"

  nginx:
    image: registry.gitlab.com/scripta/escriptorium/nginx
    build: ./nginx
    environment:
      - SERVERNAME=${DOMAIN:-localhost}
    volumes:
      - static:/usr/src/app/static
      - media:/usr/src/app/media
    ports:
      - 8080:80

  celery-main:
    <<: *app
    environment:
      - OMP_NUM_THREADS=1
    command: "celery -A escriptorium worker -l INFO -E -Ofair --prefetch-multiplier 1 -Q default -c ${CELERY_MAIN_CONC:-10} --max-tasks-per-child=10"

  celery-live:
    <<: *app
    command: "celery -A escriptorium worker -l INFO -E -Ofair --prefetch-multiplier 1 -Q live -c ${CELERY_LIVE_CONC:-10} --max-tasks-per-child=10"

  celery-low-priority:
    <<: *app
    command: "celery -A escriptorium worker -l INFO -E -Ofair --prefetch-multiplier 1 -Q low-priority -c ${CELERY_LOW_CONC:-10} --max-tasks-per-child=10"

  celery-gpu: &celery-gpu
    <<: *app
    environment:
      - KRAKEN_TRAINING_DEVICE=gpu
    command: "celery -A escriptorium worker -l INFO -E -Ofair --prefetch-multiplier 1 -Q gpu -c 2 --max-tasks-per-child=2"
    shm_size: '3gb'

  flower:
    image: docker.io/mher/flower
    command: ["celery", "--broker=redis://redis:6379/0", "flower", "--port=5555"]
    ports:
      - 5555:5555

  # No need while we don't have regular tasks
  # celerybeat:
  #   build:
  #     context: ./app
  #   env_file: variables.env
  #   volumes:
  #     - ./static/:/usr/src/app/static
  #     - ./media/:/usr/src/app/media
  #     - static:./static/
  #     - media:./media/
  #   command: celery -E -A escriptorium beat -l INFO

  mail:
    build: ./exim
    image: registry.gitlab.com/scripta/escriptorium/mail
    expose:
      - 25
    environment:
      - PRIMARY_HOST=${DOMAIN:-localhost}
      - ALLOWED_HOSTS=web ; celery-main ; celery-low-priority; docker0

volumes:
   static:
   media:
   postgres:
   esdata:
