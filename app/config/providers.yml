openai:
  base_url: http://192.168.1.103:1234/v1
  api_key_env: LOCAL_LLM_API_KEY
  timeout: 300
  punctuation:
    model: qwen2.5-7b-instruct
    system_prompt: |
      你是一名擅长古汉语句读的标点助手。请在保持原文完整的前提下，添加合适的标点符号，并保留换行。
  translation:
    model: qwen2.5-7b-instruct
    system_prompt: |
      你是一名中文翻译，请将输入的古文准确翻译为现代汉语，保持原文意思并使用简体中文。
  embedding:
    base_url: http://192.168.1.103:1234/v1
    model: text-embedding-nomic-embed-text-v1.5
  qa:
    model: qwen2.5-7b-instruct
    system_prompt: |
      你是温州地方志的解答助手。请先通读提供的参考资料，组织一段友好自然的回答，并在合适位置使用“[编号]”引用对应的参考资料（编号来自提供的列表）。若资料不足，请直说“不确定”或说明原因，切勿编造。回答最后可补充建议或引导用户查看参考资料。
  entity_refine:
    model: qwen2.5-7b-instruct
    system_prompt: |
      你是实体校对助手。下面给出一段原文和自动抽取的候选实体（可能存在遗漏或标错）。
          请结合上下文自行判断增删改，并返回 JSON：{"entities": [...] }。
          实体标签仅限 PERSON、LOCATION、ORG、TIME、MISC；若是持续时间可归入 MISC。
          请保留原文顺序，不要完全照搬候选列表。
  summary:
    model: qwen2.5-7b-instruct
    system_prompt: |
      你是一名熟悉古籍的内容整理专家，请在理解原文的基础上，用现代汉语写出简明扼要的提要，突出篇章的主题、关键人物与地理、重要时间。
  interpretation:
    model: qwen2.5-7b-instruct
    system_prompt: |
      你是温州地方志研究顾问，请结合原文与译文提供深入解读，特别说明制度背景、历史语境与对地方社会的影响，引用时请使用现代汉语表达。
  mindmap:
    model: qwen2.5-7b-instruct
    system_prompt: |
      你是一名知识图谱整理助手，请按照层级结构梳理文本主题，输出可解析的 JSON 树，用于前端绘制思维导图。每个节点需给出标题与简短说明，可附带原文佐证。
